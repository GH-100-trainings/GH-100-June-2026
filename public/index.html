<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <link href="styles.css" rel="stylesheet" />
</head>
<body>
  <div class="app-bg"></div>

  <main class="container py-5">
    <header class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-5">
      <div>
        <h1 class="display-5 fw-bold mb-1">
          <i class="bi bi-globe2 me-2"></i>World Clock
        </h1>
        <p class="text-secondary mb-0">Live local time across the Asia–Pacific</p>
      </div>

      <div class="d-flex gap-2 align-items-center">
        <div class="btn-group" role="group" aria-label="Time format">
          <input type="radio" class="btn-check" name="format" id="fmt12" autocomplete="off" checked />
          <label class="btn btn-outline-primary" for="fmt12">12h</label>

          <input type="radio" class="btn-check" name="format" id="fmt24" autocomplete="off" />
          <label class="btn btn-outline-primary" for="fmt24">24h</label>
        </div>

        <button id="themeToggle" type="button" class="btn btn-outline-secondary" aria-label="Toggle dark mode">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
      </div>
    </header>

    <div id="clockGrid" class="row g-4"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
